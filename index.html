<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini X</title>
    <style>
        body { font-family: sans-serif; background-color: #f7f9f9; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background-color: #ffffff; min-height: 100vh; border-left: 1px solid #eff3f4; border-right: 1px solid #eff3f4; box-sizing: border-box; }
        
        /* --- ★ ユーザー一覧選択（ログイン画面）のスタイル --- */
        #login-screen { padding: 40px 20px; text-align: center; }
        .user-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 30px 0; }
        .user-card { background: #f7f9f9; padding: 15px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .user-card:hover { background: #eef1f2; }
        .user-card.selected { border-color: #1d9bf0; background: #e8f5fe; }
        .user-card img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: #eee; }
        .user-card div { font-weight: bold; margin-top: 8px; font-size: 0.9em; }
        
        .password-box { display: flex; flex-direction: column; gap: 10px; max-width: 250px; margin: 0 auto; }
        .password-box input { padding: 10px; font-size: 1em; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
        .password-box button { background-color: #0f1419; color: white; border: none; border-radius: 9999px; padding: 12px; font-weight: bold; cursor: pointer; }
        .password-box button:hover { background-color: #272c30; }
        .error-msg { color: red; font-size: 0.9em; display: none; margin-top: 10px; }

        /* --- タイムライン画面のスタイル --- */
        .header { padding: 15px; font-weight: bold; font-size: 1.2em; border-bottom: 1px solid #eff3f4; position: sticky; top: 0; background: rgba(255, 255, 255, 0.9); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-left img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; cursor: pointer; }
        .logout-btn { background-color: transparent; border: 1px solid #cfd9de; border-radius: 9999px; padding: 5px 15px; font-size: 0.8em; font-weight: bold; cursor: pointer; }
        .post-box { padding: 15px; border-bottom: 1px solid #eff3f4; display: flex; gap: 12px; }
        .post-box img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .post-box-right { flex: 1; display: flex; flex-direction: column; }
        .post-box textarea { width: 100%; border: none; resize: none; font-size: 1.1em; outline: none; margin-bottom: 10px; }
        .post-box button { align-self: flex-end; background-color: #1d9bf0; color: white; border: none; border-radius: 9999px; padding: 10px 20px; font-weight: bold; cursor: pointer; }

        /* --- ★ タイムライン内のアイコン用スタイル --- */
        .post { padding: 15px; border-bottom: 1px solid #eff3f4; display: flex; gap: 12px; }
        .post img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: #eee; }
        .post-right { flex: 1; }
        .post-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
        .post-name { font-weight: bold; }
        .post-time { font-size: 0.85em; color: #536471; }
        .post-text { margin: 0; white-space: pre-wrap; }

        /* --- ★ アイコン設定モーダル（ポップアップ） --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; }
        .modal-content input { width: 100%; padding: 10px; box-sizing: border-box; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
        .modal-btns button { padding: 8px 20px; border-radius: 9999px; border: none; font-weight: bold; cursor: pointer; }
        .save-btn { background: #1d9bf0; color: white; }
        .cancel-btn { background: #efefef; }
    </style>
</head>
<body>
    <div id="login-screen" class="container">
        <h2>誰がログインしますか？</h2>
        <div id="userGrid" class="user-grid"></div>
        
        <div class="password-box">
            <input type="password" id="passwordInput" placeholder="パスワードを入力">
            <div id="loginError" class="error-msg">パスワードが違います</div>
            <button onclick="login()">ログイン</button>
        </div>
    </div>

    <div id="main-screen" class="container" style="display: none;">
        <div class="header">
            <div class="header-left">
                <img id="myIconHeader" src="" alt="" onclick="openIconModal()" title="アイコンを変更">
                <span>ホーム</span>
            </div>
            <button class="logout-btn" onclick="logout()">ログアウト</button>
        </div>
        
        <div class="post-box">
            <img id="myIconPostBox" src="" alt="">
            <div class="post-box-right">
                <textarea id="contentInput" rows="3" placeholder="いまどうしてる？"></textarea>
                <button onclick="sendPost()">ポストする</button>
            </div>
        </div>
        <div id="timeline"></div>
    </div>

    <div id="iconModal" class="modal">
        <div class="modal-content">
            <h3>アイコン画像の変更</h3>
            <p style="font-size: 0.85em; color: #536471;">ネット上の好きな画像URL、またはイラストのURLを入力してください</p>
            <input type="text" id="iconUrlInput" placeholder="https://example.com/image.jpg">
            <div class="modal-btns">
                <button class="cancel-btn" onclick="closeIconModal()">キャンセル</button>
                <button class="save-btn" onclick="saveIcon()">保存する</button>
            </div>
        </div>
    </div>

    <script>
        let selectedUsername = ""; // ログイン画面で選択されたユーザー名

        window.onload = function() {
            loadUserGrid(); // ログイン画面の6人リストを読み込む
            checkLoginStatus();
        };

        // 1. ログイン画面のユーザー一覧をサーバーから持ってきて並べる
        async function loadUserGrid() {
            const response = await fetch("/users");
            const users = await response.json();
            const grid = document.getElementById("userGrid");
            grid.innerHTML = "";

            users.forEach(user => {
                const card = document.createElement("div");
                card.className = "user-card";
                card.id = `card-${user.username}`;
                card.innerHTML = `
                    <img src="${user.icon_url}" alt="">
                    <div>${user.username}</div>
                `;
                // カードをクリックした時の処理
                card.onclick = () => selectUser(user.username);
                grid.appendChild(card);
            });
        }

        // カードを選択したときの見た目の切り替え
        function selectUser(username) {
            selectedUsername = username;
            document.querySelectorAll(".user-card").forEach(c => c.classList.remove("selected"));
            document.getElementById(`card-${username}`).classList.add("selected");
            document.getElementById("loginError").style.display = "none";
        }

        async function checkLoginStatus() {
            const response = await fetch("/me");
            if (response.ok) {
                const me = await response.json();
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("main-screen").style.display = "block";
                
                // 自分のアイコンを画面各所に反映
                document.getElementById("myIconHeader").src = me.icon_url;
                document.getElementById("myIconPostBox").src = me.icon_url;
                document.getElementById("iconUrlInput").value = me.icon_url;
                
                loadPosts();
            } else {
                document.getElementById("login-screen").style.display = "block";
                document.getElementById("main-screen").style.display = "none";
            }
        }

        async function login() {
            if (!selectedUsername) {
                alert("まずは一覧からあなた自身の名前を選んでください！");
                return;
            }
            const pass = document.getElementById("passwordInput").value;
            
            const response = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: selectedUsername, password: pass })
            });

            if (response.ok) {
                document.getElementById("loginError").style.display = "none";
                document.getElementById("passwordInput").value = "";
                checkLoginStatus();
            } else {
                document.getElementById("loginError").style.display = "block";
            }
        }

        async function logout() {
            await fetch("/logout", { method: "POST" });
            selectedUsername = "";
            document.querySelectorAll(".user-card").forEach(c => c.classList.remove("selected"));
            document.getElementById("passwordInput").value = "";
            checkLoginStatus();
        }

        async function loadPosts() {
            const response = await fetch("/posts");
            if (!response.ok) return;
            
            const posts = await response.json();
            const timeline = document.getElementById("timeline");
            timeline.innerHTML = "";

            posts.forEach(post => {
                const date = new Date(post.created_at + "Z");
                const timeString = date.toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });

                const postDiv = document.createElement("div");
                postDiv.className = "post";
                // ★ 投稿の横にアイコン画像を表示するようにパワーアップ！
                postDiv.innerHTML = `
                    <img src="${post.icon_url}" alt="">
                    <div class="post-right">
                        <div class="post-header">
                            <div class="post-name">@${post.name}</div>
                            <div class="post-time">${timeString}</div>
                        </div>
                        <div class="post-text">${post.content}</div>
                    </div>
                `;
                timeline.appendChild(postDiv);
            });
        }

        async function sendPost() {
            const content = document.getElementById("contentInput").value;
            if (content === "") return;

            await fetch("/posts", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ content: content })
            });

            document.getElementById("contentInput").value = "";
            loadPosts();
        }

        // --- ★ アイコン変更ポップアップの制御 ---
        function openIconModal() { document.getElementById("iconModal").style.display = "flex"; }
        function closeIconModal() { document.getElementById("iconModal").style.display = "none"; }
        
        async function saveIcon() {
            const newUrl = document.getElementById("iconUrlInput").value;
            if(!newUrl) return;

            await fetch("/me/icon", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ icon_url: newUrl })
            });

            closeIconModal();
            checkLoginStatus(); // 画面全体のアイコン表示を更新
        }
    </script>
</body>
</html>
