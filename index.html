<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- ★ ファビコンの設定を追加 -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taikitter</title>
    <style>
        body { font-family: sans-serif; background-color: #f7f9f9; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background-color: #ffffff; min-height: 100vh; border-left: 1px solid #eff3f4; border-right: 1px solid #eff3f4; }
        .header { padding: 15px; font-weight: bold; font-size: 1.2em; border-bottom: 1px solid #eff3f4; position: sticky; top: 0; background: rgba(255, 255, 255, 0.9); }
        .post-box { padding: 15px; border-bottom: 1px solid #eff3f4; display: flex; flex-direction: column; }
        .post-box input { width: 30%; padding: 5px; margin-bottom: 10px; border: 1px solid #eff3f4; border-radius: 5px; font-size: 1em; outline: none; }
        .post-box textarea { width: 100%; border: none; resize: none; font-size: 1.1em; outline: none; margin-bottom: 10px; }
        .post-box button { align-self: flex-end; background-color: #1d9bf0; color: white; border: none; border-radius: 9999px; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        .post-box button:hover { background-color: #1a8cd8; }
        .post { padding: 15px; border-bottom: 1px solid #eff3f4; }
        
        /* ★名前と時間を横並びにするデザインを追加 */
        .post-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
        .post-name { font-weight: bold; }
        .post-time { font-size: 0.85em; color: #536471; }
        
        .post-text { margin: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">ホーム</div>
        <div class="post-box">
            <input type="text" id="nameInput" placeholder="名前 (例: 友達A)">
            <textarea id="contentInput" rows="3" placeholder="いまどうしてる？"></textarea>
            <button onclick="sendPost()">ポストする</button>
        </div>
        <div id="timeline"></div>
    </div>

    <script>
        const API_URL = "/posts";

        async function loadPosts() {
            const response = await fetch(API_URL);
            const posts = await response.json();
            
            const timeline = document.getElementById("timeline");
            timeline.innerHTML = "";

            posts.forEach(post => {
                // ★データベースの時間を、日本時間の読みやすい形式に変換する
                const date = new Date(post.created_at + "Z");
                const timeString = date.toLocaleString('ja-JP', {
                    month: 'numeric',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                const postDiv = document.createElement("div");
                postDiv.className = "post";
                // ★名前に加えて、変換した時間も表示するように変更
                postDiv.innerHTML = `
                    <div class="post-header">
                        <div class="post-name">${post.name}</div>
                        <div class="post-time">${timeString}</div>
                    </div>
                    <div class="post-text">${post.content}</div>
                `;
                timeline.appendChild(postDiv);
            });
        }

        async function sendPost() {
            const name = document.getElementById("nameInput").value;
            const content = document.getElementById("contentInput").value;

            if (name === "" || content === "") {
                alert("名前と投稿内容を両方入力してください！");
                return;
            }

            await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: name, content: content })
            });

            document.getElementById("contentInput").value = "";
            loadPosts();
        }

        loadPosts();
    </script>
</body>
</html>
